[build]
builder = "nixpacks"
buildCommand = "cd shopsmart && npm install && npm run build"

[deploy]
startCommand = "gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2"

[[deploy.releaseCommands]]
command = "python manage.py collectstatic --noinput && python manage.py migrate --noinput"