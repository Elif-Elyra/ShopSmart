[build]
builder = "nixpacks"
buildCommand = "cd shopsmart && npm install && npm run build && cd .. && pip install poetry && poetry install --no-root --only main"
[deploy]
startCommand = "python manage.py migrate --no-input && python manage.py collectstatic --no-input && gunicorn core.wsgi:application --bind 0.0.0.0:$PORT"