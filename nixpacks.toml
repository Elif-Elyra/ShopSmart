[phases.setup]
nixPkgs = ["python313", "poetry"]

[phases.install]
cmds = [
    "poetry config virtualenvs.create false",
    "poetry install --no-root --no-interaction"
]

[start]
cmd = "python manage.py migrate --noinput && python manage.py collectstatic --noinput && gunicorn core.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120"